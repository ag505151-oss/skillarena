services:
  - type: web
    name: skillarena-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @skillarena/db build && pnpm --filter @skillarena/types build && pnpm --filter @skillarena/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
